description_key_set:
  name: "Indiana-Trimble (PNEZD)"
  source_format: "Trimble Access PNEZD CSV export"
  collector: "Trimble Access 2024 and later"
  collector_native_format: "JOB / JXL (XML); CSV is the export route"
  appliesTo: [civil3d-2022, civil3d-2024, civil3d-2025, civil3d-2026]
  updated: 2026-05-11
  sources:
    - title: "Trimble Access Help Portal — Export menu"
      url: "https://help.trimblegeospatial.com/TrimbleAccess/"
      verified: 2026-05-11
  notes: |
    Trimble Access typically writes the description in field 5 of PNEZD CSV.
    Feature-coding suffixes (start of line `+`, end of line `-`, curve `~`)
    can land in either field 5 or a separate "Code" column depending on the
    export template. This key set assumes the suffix is appended to the
    description string, so wildcards include trailing `*` to absorb it.
    Tree diameter is conventionally a second token: `TR-DEC 12`.
  match_order:
    - "More specific codes first (e.g. IPF-RC before IPF)"
    - "Generic / wildcard fall-through codes last"

# Key column reference:
#   code            — Civil 3D wildcard pattern matched against Raw Description
#   point_style     — name from customization/templates/point-styles.yaml
#   label_style     — name from customization/templates/point-styles.yaml
#   layer           — name from customization/templates/layer-standard.csv
#   format_string   — Full Description template ($1/$2/$* tokens allowed)
#   scale_param_1   — optional scale parameter for the marker
#   rotate_param    — optional rotation parameter

keys:
  # Monumentation
  - { code: "IPF-RC*",       point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found iron pin with cap" }
  - { code: "IPF5*",         point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found 5/8-inch iron pin" }
  - { code: "IPF3*",         point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found 3/8-inch iron pin" }
  - { code: "IPF*",          point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found 1/2-inch iron pin" }
  - { code: "IPS-RC*",       point_style: SET-MONUMENT,         label_style: SET-MONUMENT-LABEL,   layer: V-MON-SET, format_string: "Set 5/8-inch iron pin with cap" }
  - { code: "IPS*",          point_style: SET-MONUMENT,         label_style: SET-MONUMENT-LABEL,   layer: V-MON-SET, format_string: "Set 5/8-inch iron pin" }
  - { code: "IRC*",          point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Iron rod with cap" }
  - { code: "CONC-MON-SET*", point_style: SET-MONUMENT,         label_style: SET-MONUMENT-LABEL,   layer: V-MON-SET, format_string: "Set concrete monument" }
  - { code: "CONC-MON*",     point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found concrete monument" }
  - { code: "MAG-F*",        point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Found mag nail" }
  - { code: "MAG-S*",        point_style: SET-MONUMENT,         label_style: SET-MONUMENT-LABEL,   layer: V-MON-SET, format_string: "Set mag nail" }
  - { code: "MAG-WS*",       point_style: SET-MONUMENT,         label_style: SET-MONUMENT-LABEL,   layer: V-MON-SET, format_string: "Set mag nail with washer" }
  - { code: "MAG*",          point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON,     format_string: "Mag nail" }
  - { code: "RR-SPIKE*",     point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON,     format_string: "Railroad spike" }
  - { code: "X-CONC*",       point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON,     format_string: "Cross in concrete" }
  - { code: "X-CURB*",       point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON,     format_string: "Cross cut in curb" }
  - { code: "DSK*",          point_style: FOUND-MONUMENT,       label_style: FOUND-MONUMENT-LABEL, layer: V-MON-FND, format_string: "Disk on rod" }
  - { code: "SEC-COR*",      point_style: FOUND-MONUMENT,       label_style: CONTROL-POINT-LABEL,  layer: V-PROP-CTRL, format_string: "Section corner" }
  - { code: "QTR-COR*",      point_style: FOUND-MONUMENT,       label_style: CONTROL-POINT-LABEL,  layer: V-PROP-CTRL, format_string: "Quarter corner" }

  # Control
  - { code: "CP*",           point_style: CONTROL-POINT,        label_style: CONTROL-POINT-LABEL, layer: V-NODE-CTRL, format_string: "Control point" }
  - { code: "TBM*",          point_style: CONTROL-POINT,        label_style: CONTROL-POINT-LABEL, layer: V-NODE-CTRL, format_string: "Temporary benchmark" }
  - { code: "BM*",           point_style: CONTROL-POINT,        label_style: CONTROL-POINT-LABEL, layer: V-NODE-CTRL, format_string: "Benchmark" }
  - { code: "GPS*",          point_style: CONTROL-POINT,        label_style: CONTROL-POINT-LABEL, layer: V-NODE-CTRL, format_string: "GPS control" }

  # Curb / pavement feature codes (Trimble feature codes often have +/- suffix)
  - { code: "TBC*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-CURB, format_string: "Top of back of curb" }
  - { code: "BC*",           point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-CURB, format_string: "Back of curb" }
  - { code: "TC*",           point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-CURB, format_string: "Top of curb" }
  - { code: "FL*",           point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-CURB, format_string: "Flowline" }
  - { code: "GUT*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-CURB, format_string: "Gutter" }
  - { code: "EOP*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-EDGE, format_string: "Edge of pavement" }
  - { code: "EOA*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-EDGE, format_string: "Edge of asphalt" }
  - { code: "EOG*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-EDGE, format_string: "Edge of gravel" }
  - { code: "EOC*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-EDGE, format_string: "Edge of concrete" }
  - { code: "WALK*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-WALK, format_string: "Sidewalk" }
  - { code: "DRV-CONC*",     point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-DRIV, format_string: "Concrete driveway" }
  - { code: "DRV-ASPH*",     point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-DRIV, format_string: "Asphalt driveway" }
  - { code: "DRV*",          point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-DRIV, format_string: "Driveway" }
  - { code: "STRIPE*",       point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ROAD-STRP, format_string: "Pavement stripe" }

  # Sanitary
  - { code: "SAN-MH*",       point_style: SAN-MANHOLE,          label_style: UTILITY-LABEL, layer: V-SSWR-MH, format_string: "Sanitary manhole" }
  - { code: "SAN-CO*",       point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-SSWR,    format_string: "Sanitary cleanout" }

  # Storm
  - { code: "STM-MH*",       point_style: STM-MANHOLE,          label_style: UTILITY-LABEL, layer: V-STRM-MH, format_string: "Storm manhole" }
  - { code: "STO-MH*",       point_style: STM-MANHOLE,          label_style: UTILITY-LABEL, layer: V-STRM-MH, format_string: "Storm manhole" }
  - { code: "STM-CB*",       point_style: STM-INLET,            label_style: UTILITY-LABEL, layer: V-STRM-CB, format_string: "Storm catch basin" }
  - { code: "STO-CB*",       point_style: STM-INLET,            label_style: UTILITY-LABEL, layer: V-STRM-CB, format_string: "Storm catch basin" }
  - { code: "STM-IN*",       point_style: STM-INLET,            label_style: UTILITY-LABEL, layer: V-STRM-CB, format_string: "Storm inlet" }
  - { code: "STM-FES*",      point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-STRM-ES, format_string: "Flared end section" }
  - { code: "DTCH*",         point_style: SHOT,                 label_style: SHOT-LABEL,    layer: V-STRM-DTCH, format_string: "Drainage ditch" }

  # Water
  - { code: "WV*",           point_style: WATER-VALVE,          label_style: UTILITY-LABEL, layer: V-WATR-VALV, format_string: "Water valve" }
  - { code: "GV*",           point_style: WATER-VALVE,          label_style: UTILITY-LABEL, layer: V-WATR-VALV, format_string: "Gate valve" }
  - { code: "WM*",           point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-WATR-METR, format_string: "Water meter" }
  - { code: "FH*",           point_style: HYDRANT,              label_style: UTILITY-LABEL, layer: V-WATR-VALV, format_string: "Fire hydrant" }

  # Gas / Electric / Telecom
  - { code: "GAS-MK*",       point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-NGAS-MARK, format_string: "Gas marker" }
  - { code: "GAS-METER*",    point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-NGAS-MARK, format_string: "Gas meter" }
  - { code: "ELEC-TR*",      point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-ELEC-UGND, format_string: "Electric transformer" }
  - { code: "ELEC-PB*",      point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-ELEC-UGND, format_string: "Electric pull box" }
  - { code: "ELEC-MH*",      point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-ELEC-UGND, format_string: "Electric manhole" }
  - { code: "PP*",           point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-ELEC-POLE, format_string: "Power pole" }
  - { code: "LITE*",         point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-ELEC-LITE, format_string: "Light pole" }
  - { code: "TEL-PED*",      point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-COMM-UGND, format_string: "Telecom pedestal" }
  - { code: "CATV-PED*",     point_style: UTILITY-APPURTENANCE, label_style: UTILITY-LABEL, layer: V-COMM-CATV, format_string: "Cable TV pedestal" }

  # Buildings / hardscape
  - { code: "BLDG*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-BLDG,        format_string: "Building corner" }
  - { code: "ROOF*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-BLDG-ROOF,   format_string: "Roof overhang" }
  - { code: "FENCE*",        point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-FENC,        format_string: "Fence" }
  - { code: "WALL*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-FENC-WALL,   format_string: "Wall" }
  - { code: "CONC-PAD*",     point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-FLOR-PATT,   format_string: "Concrete pad" }
  - { code: "AC-PAD*",       point_style: UTILITY-STRUCTURE,    label_style: UTILITY-LABEL, layer: V-MISC,     format_string: "AC pad" }

  # Vegetation — tree diameter token: $2
  - { code: "TR-DEC*",       point_style: TREE,                 label_style: TREE-LABEL, layer: V-VEGE-TREE, format_string: "Deciduous tree $2\"", scale_param_1: 2 }
  - { code: "TR-CON*",       point_style: TREE,                 label_style: TREE-LABEL, layer: V-VEGE-TREE, format_string: "Coniferous tree $2\"", scale_param_1: 2 }
  - { code: "TR-MAP*",       point_style: TREE,                 label_style: TREE-LABEL, layer: V-VEGE-TREE, format_string: "Maple $2\"", scale_param_1: 2 }
  - { code: "TR-OAK*",       point_style: TREE,                 label_style: TREE-LABEL, layer: V-VEGE-TREE, format_string: "Oak $2\"", scale_param_1: 2 }
  - { code: "TR*",           point_style: TREE,                 label_style: TREE-LABEL, layer: V-VEGE-TREE, format_string: "Tree" }
  - { code: "BRUSH*",        point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-VEGE-BRSH, format_string: "Brush" }
  - { code: "FIELD-EDGE*",   point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-VEGE-LINE, format_string: "Edge of field" }

  # Topography
  - { code: "GR-MAJ*",       point_style: SHOT,                 label_style: SHOT-LABEL, layer: C-TOPO-BRKL, format_string: "Major grade break" }
  - { code: "GR-MIN*",       point_style: SHOT,                 label_style: SHOT-LABEL, layer: C-TOPO-BRKL, format_string: "Minor grade break" }
  - { code: "SPOT*",         point_style: SPOT-ELEVATION,       label_style: ELEV-ONLY-LABEL, layer: C-TOPO-SPOT, format_string: "Spot elevation" }
  - { code: "GR*",           point_style: SPOT-ELEVATION,       label_style: ELEV-ONLY-LABEL, layer: C-TOPO-SPOT, format_string: "Ground shot" }

  # ALTA
  - { code: "ENCR*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ALTA-ENCR, format_string: "Encroachment: $*" }
  - { code: "EVID*",         point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-ALTA-EVID, format_string: "Observed evidence: $*" }

  # Catch-all (must remain last)
  - { code: "*",             point_style: SHOT,                 label_style: SHOT-LABEL, layer: V-MISC,        format_string: "$*" }

format_quirks:
  trailing_suffix_codes:
    - "+    line-start suffix (start a connecting figure)"
    - "-    line-end suffix"
    - "..PC start curve"
    - "..PT end curve"
  recommendation: "Trim trailing suffixes on import via a Survey User Setting if you don't want them in the Civil 3D Raw Description; otherwise rely on the trailing `*` wildcard in every key code."
